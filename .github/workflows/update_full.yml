name: update_full_rules
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'
  issues:
    types: [closed]

jobs:
   master:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        persist-credentials: false
    - name: Create local changes
      run: |
        sudo rm -rf /etc/localtime
        sudo ln -s /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
        sudo apt-get install -y dos2unix perl gawk
        chmod +x update_full.sh
        (bash update_full.sh) && sync
      shell: bash
    - name: Commit files
      run: |
        git config --local user.email ${{ secrets.MYEMAIL }}
        git config --local user.name ${{ secrets.MYUSERNAME }}
        git add .
        git commit -a -m "Full Rules update" || echo "No changes to commit"
        git pull --rebase origin ${{ github.ref_name }}
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}
