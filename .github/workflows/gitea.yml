name: Sync Code to GITEA

on:
  push:
    branches:
      - main

jobs:
  sync-to-gitea:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Git push assets to GITEA
        run: |
          git config --local user.name "${{ secrets.GITEA_NAME }}"
          git config --local user.email "${{ secrets.GITEA_EMAIL }}"
          git remote remove origin
          git remote add origin "https://lonely_dog:${{ secrets.GITEA_TOKEN }}@gitea.com/adblock_auto.git"
          git checkout main
          git merge origin/main
