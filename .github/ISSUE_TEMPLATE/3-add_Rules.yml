name: 规则贡献
description: 如果觉得pr麻烦可以在这里提交你的规则。
labels: ["规则贡献"]
assignees: 
  -  lingeringsound
body:
  - type: dropdown
    id: targetwebsite
    attributes:
      label: 规则类型
      description: |
        规则对应的类型，放行还是拦截
      multiple: true
      options:
        - 拦截
        - 放行
    validations:
      required: false
  
  - type: textarea
    id: targetRules
    attributes:
      label: 规则
      description: 输入您的规则
      placeholder: 请输入Adblock语法的规则……
    validations:
      required: true
